<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LangGraph CDP Orchestrator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="chat-shell">
      <header class="chat-topbar">
        <button id="newThreadBtn" class="icon-btn" type="button" title="New thread">+</button>
        <div class="topbar-actions">
          <button id="memoryToggleBtn" class="icon-btn" type="button" title="Show thread memory" aria-label="Toggle thread memory">M</button>
          <button id="optionsBtn" class="icon-btn" type="button" title="Settings" aria-label="Settings">S</button>
        </div>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <footer class="composer">
        <textarea id="prompt" rows="1" placeholder="Type a message"></textarea>
        <button id="runBtn" type="button">Send</button>
      </footer>

      <section id="debugPanel" class="debug-panel hidden" aria-hidden="true">
        <input id="threadId" type="text" value="default-thread" />
        <pre id="memory"></pre>
      </section>
    </main>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
