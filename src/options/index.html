<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extension Options</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="panel">
      <h1>Chat Model Settings</h1>
      <p class="sub">Choose a provider and model for this extension.</p>

      <label>
        Provider
        <select id="provider">
          <option value="openai">OpenAI</option>
          <option value="ollama">Ollama (local)</option>
        </select>
      </label>

      <label>
        Model
        <input id="model" type="text" placeholder="e.g. gpt-4.1-mini-2025-04-14" />
      </label>

      <label id="apiKeyLabel">
        OpenAI API Key
        <input id="apiKey" type="password" placeholder="sk-..." />
      </label>

      <label id="baseUrlLabel" style="display:none">
        Ollama Base URL
        <input id="baseUrl" type="text" value="http://localhost:11434" placeholder="http://localhost:11434" />
      </label>

      <div id="testRow" style="display:none">
        <button id="testBtn" type="button">Test Connection</button>
        <span id="testStatus"></span>
      </div>

      <button id="saveBtn" type="button">Save Settings</button>
      <pre id="status"></pre>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
