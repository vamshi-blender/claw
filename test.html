<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UI Action Test Page</title>
<style>
  body {
    font-family: sans-serif;
    margin: 30px;
  }
  section {
    margin-bottom: 40px;
    border: 1px solid #ccc;
    padding: 15px;
  }
  .hover-box {
    width: 150px;
    height: 100px;
    background: #eef;
    line-height: 100px;
    text-align: center;
    transition: background 0.3s;
  }
  .hover-box:hover {
    background: #cfc;
  }
  .drag-area {
    width: 200px;
    height: 100px;
    background: #fdd;
    position: relative;
  }
  .draggable {
    width: 50px;
    height: 50px;
    background: #d77;
    position: absolute;
    top: 25px;
    left: 25px;
    cursor: grab;
  }
  .drop-zone {
    width: 300px;
    height: 200px;
    border: 2px dashed #aaa;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #888;
    font-size: 14px;
    transition: background 0.2s, border-color 0.2s;
    overflow: hidden;
  }
  .drop-zone.dragover {
    background: #e8f5e9;
    border-color: #4caf50;
    color: #4caf50;
  }
  .drop-zone img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }
  .spacer {
    height: 800px; /* for scroll testing */
  }
</style>
</head>
<body>

<h1>Interaction Test Page</h1>

<section id="click-tests">
  <h2>Click Tests</h2>
  <button id="leftClickBtn">Left Click Me</button>
  <button id="rightClickBtn">Right Click Me</button>
  <button id="doubleClickBtn">Double Click Me</button>
  <button id="tripleClickBtn">Triple Click Me</button>
  <p id="clickOutput">Action: (none)</p>
</section>

<section id="typing-tests">
  <h2>Typing Test</h2>
  <input type="text" id="textInput" placeholder="Type here..." />
  <p id="typedOutput"></p>
</section>

<section id="hover-tests">
  <h2>Hover Test</h2>
  <div class="hover-box" id="hoverBox">Hover over me</div>
</section>

<section id="drag-tests">
  <h2>Drag Test</h2>
  <div class="drag-area" id="dragArea">
    <div class="draggable" id="draggable"></div>
  </div>
</section>

<section id="file-select-tests">
  <h2>File Select Test</h2>
  <input type="file" id="fileInput" />
  <p id="fileOutput">No file selected</p>
</section>

<section id="image-drop-tests">
  <h2>Image Drag & Drop Test</h2>
  <div class="drop-zone" id="dropZone">Drag & drop an image here</div>
  <p id="dropOutput">No image dropped</p>
</section>

<section id="network-tests">
  <h2>Network Request Tests</h2>
  <button id="netSuccessBtn">GET (200 OK)</button>
  <button id="net404Btn">GET (404 Not Found)</button>
  <button id="net500Btn">GET (500 Server Error)</button>
  <button id="netCorsBtn">GET (CORS Fail)</button>
  <button id="netPostBtn">POST (200 OK)</button>
  <button id="netTimeoutBtn">GET (Timeout)</button>
  <p id="networkOutput">Status: (none)</p>
</section>

<section id="scroll-tests">
  <h2>Scroll Test</h2>
  <div class="spacer"></div>
  <p>You scrolled all the way down. 🎯</p>
</section>

<script>
  // Click tests
  const output = document.getElementById('clickOutput');
  document.getElementById('leftClickBtn').addEventListener('click', () => output.textContent = 'Action: Left click');
  document.getElementById('rightClickBtn').addEventListener('contextmenu', (e) => {
    e.preventDefault();
    output.textContent = 'Action: Right click';
  });
  document.getElementById('doubleClickBtn').addEventListener('dblclick', () => output.textContent = 'Action: Double click');

  // Triple click detection (quick 3 left clicks)
  const tripleBtn = document.getElementById('tripleClickBtn');
  let clickCount = 0;
  let clickTimer;
  tripleBtn.addEventListener('click', () => {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => clickCount = 0, 400);
    if (clickCount === 3) {
      output.textContent = 'Action: Triple click';
      clickCount = 0;
    }
  });

  // Typing test
  const input = document.getElementById('textInput');
  const typedOutput = document.getElementById('typedOutput');
  input.addEventListener('input', () => {
    typedOutput.textContent = 'You typed: ' + input.value;
    console.log('Typing input changed: ' + input.value);
    console.warn('Warning: user is typing in the input field');
    console.error('Error: simulated error for typing event');
  });

  // Drag-and-drop
  const draggable = document.getElementById('draggable');
  const area = document.getElementById('dragArea');
  let isDragging = false;
  draggable.addEventListener('mousedown', e => { isDragging = true; });
  window.addEventListener('mouseup', e => { isDragging = false; });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const rect = area.getBoundingClientRect();
    const x = e.clientX - rect.left - draggable.clientWidth / 2;
    const y = e.clientY - rect.top - draggable.clientHeight / 2;
    draggable.style.left = Math.max(0, Math.min(rect.width - draggable.clientWidth, x)) + 'px';
    draggable.style.top = Math.max(0, Math.min(rect.height - draggable.clientHeight, y)) + 'px';
  });

  // File select
  const fileInput = document.getElementById('fileInput');
  const fileOutput = document.getElementById('fileOutput');
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) {
      fileOutput.textContent = 'Selected: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
    } else {
      fileOutput.textContent = 'No file selected';
    }
  });

  // Image drag & drop
  const dropZone = document.getElementById('dropZone');
  const dropOutput = document.getElementById('dropOutput');

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
  });
  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
  });
  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        dropZone.innerHTML = '';
        const img = document.createElement('img');
        img.src = ev.target.result;
        dropZone.appendChild(img);
      };
      reader.readAsDataURL(file);
      dropOutput.textContent = 'Dropped: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)';
    } else {
      dropOutput.textContent = 'Please drop an image file.';
    }
  });

  // Network request tests
  const networkOutput = document.getElementById('networkOutput');

  function updateNetStatus(label, response) {
    networkOutput.textContent = 'Status: ' + label + ' — ' + response;
  }

  // 200 OK - successful GET
  document.getElementById('netSuccessBtn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching...';
    fetch('https://httpbin.org/get')
      .then(r => updateNetStatus('GET /get', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('GET /get', 'Error: ' + e.message));
  });

  // 404 Not Found
  document.getElementById('net404Btn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching...';
    fetch('https://httpbin.org/status/404')
      .then(r => updateNetStatus('GET /status/404', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('GET /status/404', 'Error: ' + e.message));
  });

  // 500 Server Error
  document.getElementById('net500Btn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching...';
    fetch('https://httpbin.org/status/500')
      .then(r => updateNetStatus('GET /status/500', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('GET /status/500', 'Error: ' + e.message));
  });

  // CORS failure - request to a non-CORS endpoint
  document.getElementById('netCorsBtn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching...';
    fetch('https://www.google.com/', { mode: 'cors' })
      .then(r => updateNetStatus('GET google.com (CORS)', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('GET google.com (CORS)', 'Error: ' + e.message));
  });

  // POST request - successful
  document.getElementById('netPostBtn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching...';
    fetch('https://httpbin.org/post', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ test: true, message: 'hello' })
    })
      .then(r => updateNetStatus('POST /post', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('POST /post', 'Error: ' + e.message));
  });

  // Timeout - delayed response with AbortController
  document.getElementById('netTimeoutBtn').addEventListener('click', () => {
    networkOutput.textContent = 'Status: Fetching (will timeout in 2s)...';
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 2000);
    fetch('https://httpbin.org/delay/10', { signal: controller.signal })
      .then(r => updateNetStatus('GET /delay/10', r.status + ' ' + r.statusText))
      .catch(e => updateNetStatus('GET /delay/10 (Timeout)', 'Error: ' + e.message));
  });

  // Hover visual feedback (already CSS)
  document.getElementById('hoverBox').addEventListener('mouseenter', () => console.log('Hover started'));
  document.getElementById('hoverBox').addEventListener('mouseleave', () => console.log('Hover ended'));
</script>

</body>
</html>
