<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Job Application</title>

<style>

body{
font-family: Arial;
background:#f5f6fa;
margin:0;
}

.container{
width:650px;
margin:40px auto;
background:white;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
margin-top:0;
}

.field{
margin-bottom:18px;
}

label{
display:block;
font-weight:bold;
margin-bottom:6px;
}

input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:4px;
}

button{
padding:12px 20px;
background:#2d6cdf;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e4fb8;
}

.hidden{
display:none;
}

.error{
color:red;
font-weight:bold;
}

.success{
color:green;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h2>Software Engineer Application</h2>

<form id="jobForm">

<div class="field">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="field">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="field">
<label>Years of Experience</label>
<select id="experience">
<option value="">Select</option>
<option>0-1</option>
<option>2-4</option>
<option>5+</option>
</select>
</div>

<div id="seniorFields" class="hidden">

<div class="field">
<label>Architecture Experience (years)</label>
<input type="number" id="architecture">
</div>

<div class="field">
<label>Team Size Managed</label>
<input type="number" id="teamSize">
</div>

</div>

<div class="field">
<label>Primary Skill</label>
<select id="skill">
<option value="">Select</option>
<option>Frontend</option>
<option>Backend</option>
<option>Data</option>
</select>
</div>

<div id="dynamicSkill"></div>

<div class="field">
<label>Why should we hire you?</label>
<textarea id="reason" rows="4"></textarea>
</div>

<!-- Honeypot Field -->
<div style="display:none">
<input type="text" id="companyWebsite">
</div>

<div class="field">
<label>
<input type="checkbox" id="humanCheck">
I confirm I manually filled this form
</label>
</div>

<div class="field">
<button type="submit">Submit Application</button>
</div>

<div id="msg"></div>

</form>

</div>

<script>

/* behavior tracking */

let formLoadTime = Date.now()
let mouseMoves = 0
let pasted = false

document.addEventListener("mousemove",()=>mouseMoves++)

document.getElementById("reason").addEventListener("paste",()=>{
pasted = true
})

/* conditional experience fields */

document.getElementById("experience").addEventListener("change",function(){

let val = this.value
let senior = document.getElementById("seniorFields")

if(val==="5+"){
senior.classList.remove("hidden")
}else{
senior.classList.add("hidden")
}

})

/* dynamic skill fields */

document.getElementById("skill").addEventListener("change",function(){

let container = document.getElementById("dynamicSkill")
container.innerHTML=""

let skill = this.value

if(skill==="Frontend"){

container.innerHTML = `
<div class="field">
<label>Favorite JS Framework</label>
<input type="text" id="framework">
</div>
`

}

if(skill==="Backend"){

container.innerHTML = `
<div class="field">
<label>Preferred Backend Language</label>
<input type="text" id="backendLang">
</div>
`

}

if(skill==="Data"){

container.innerHTML = `
<div class="field">
<label>ML Experience (years)</label>
<input type="number" id="mlExp">
</div>
`

}

})

/* random hidden math challenge */

let challengeA = Math.floor(Math.random()*10)+1
let challengeB = Math.floor(Math.random()*10)+1
let challengeAnswer = challengeA + challengeB

let hiddenInput = document.createElement("input")
hiddenInput.type="hidden"
hiddenInput.id="humanMath"
hiddenInput.value=challengeAnswer

document.getElementById("jobForm").appendChild(hiddenInput)

/* submit logic */

document.getElementById("jobForm").addEventListener("submit",function(e){

e.preventDefault()

let msg = document.getElementById("msg")
msg.innerHTML=""

let timeSpent = (Date.now() - formLoadTime)/1000

let isBot = false

/* honeypot */

if(document.getElementById("companyWebsite").value!==""){
isBot = true
}

/* too fast */

if(timeSpent < 4){
isBot = true
}

/* no mouse movement */

if(mouseMoves < 10){
isBot = true
}

/* pasted content */

if(pasted){
isBot = true
}

/* human checkbox */

if(!document.getElementById("humanCheck").checked){
isBot = true
}

/* result */

if(isBot){
msg.innerHTML="<p class='error'>Submitted by bot</p>"
}else{
msg.innerHTML="<p class='success'>Application submitted successfully</p>"
}

})

</script>

</body>
</html>
